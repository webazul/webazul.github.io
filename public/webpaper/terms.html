<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebPaper - Terms of Service</title>
<script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var lang = params.get('lang');
    if (!lang) {
      var nav = navigator.language || navigator.userLanguage || 'en';
      lang = nav.split('-')[0].toLowerCase();
    }
    var supported = ['pt', 'es', 'fr', 'de'];
    if (supported.indexOf(lang) !== -1) {
      window.location.replace(lang + '-terms.html');
    } else {
      window.location.replace('en-terms.html');
    }
  })();
</script>
</head>
<body>
<p style="text-align:center;padding:40px;font-family:sans-serif;color:#888">Redirecting...</p>
</body>
</html>
